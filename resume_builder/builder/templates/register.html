{% extends 'base.html' %}

{% block content %}
<style>
    .register-wrap {
        display: flex;
        justify-content: center;
        padding: 20px 0;
    }

    .register-card {
        background: white;
        border-radius: 20px;
        padding: 40px;
        width: 100%;
        max-width: 460px;
        box-shadow: 0 8px 40px rgba(92,110,248,0.12);
        border: 1px solid #e8eaff;
    }

    .register-card h2 {
        font-family: 'Fraunces', serif;
        font-size: 28px;
        color: #1a1a2e;
        margin-bottom: 4px;
    }

    .register-card .sub {
        color: #6b7280;
        font-size: 14px;
        margin-bottom: 28px;
    }

    .register-card p {
        margin-bottom: 4px;
    }

    .register-card label {
        font-weight: 600;
        font-size: 12px;
        color: #6b7280;
        text-transform: uppercase;
        letter-spacing: 0.5px;
        display: block;
        margin-bottom: 4px;
    }

    .register-card input {
        background: #f8f9ff;
        border: 1.5px solid #e0e4ff;
        border-radius: 10px;
        padding: 11px 14px;
        width: 100%;
        color: #1a1a2e;
        font-family: 'DM Sans', sans-serif;
        font-size: 14px;
        margin-bottom: 14px;
        transition: 0.2s;
    }

    .register-card input:focus {
        outline: none;
        border-color: #5c6ef8;
        background: white;
        box-shadow: 0 0 0 3px rgba(92,110,248,0.12);
    }

    .register-card ul {
        font-size: 12px;
        color: #9ca3af;
        margin: -8px 0 12px 16px;
    }

    .btn-register {
        width: 100%;
        padding: 13px;
        background: #5c6ef8;
        border: none;
        border-radius: 10px;
        color: white;
        font-weight: 700;
        font-size: 15px;
        cursor: pointer;
        font-family: 'DM Sans', sans-serif;
        transition: 0.3s;
        margin-top: 8px;
    }

    .btn-register:hover {
        background: #3a4ce0;
        box-shadow: 0 8px 24px rgba(92,110,248,0.35);
        transform: translateY(-1px);
    }

    .login-link {
        text-align: center;
        margin-top: 20px;
        font-size: 13px;
        color: #9ca3af;
    }

    .login-link a {
        color: #5c6ef8;
        font-weight: 600;
        text-decoration: none;
    }
</style>

<div class="register-wrap">
    <div class="register-card">
        <h2>Create Account</h2>
        <p class="sub">Start building your professional resume today</p>

        <form method="POST">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="btn-register">Create Account →</button>
        </form>

        <p class="login-link">Already have an account? <a href="/login/">Sign in</a></p>
    </div>
</div>

{% endblock %}
