{% extends 'base.html' %}
{% load static %}

{% block content %}
<style>
    .contact-wrapper { max-width: 620px; margin: 0 auto; }
    .page-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 36px; }
    .page-header h1 { font-family: 'Fraunces', serif; font-size: 32px; font-weight: 900; color: #1a1a2e; }
    .page-header p { color: #6b7280; font-size: 14px; margin-top: 4px; }
    .contact-card { background: white; border-radius: 18px; padding: 36px; border: 1.5px solid #e8eaff; box-shadow: 0 2px 12px rgba(92,110,248,0.07); position: relative; overflow: hidden; }
    .contact-card::before { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 4px; background: linear-gradient(90deg, #5c6ef8, #10b981); }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-weight: 600; font-size: 13px; color: #374151; margin-bottom: 6px; }
    .form-group input, .form-group textarea, .form-group select { width: 100%; padding: 11px 14px; border: 1.5px solid #e5e7eb; border-radius: 10px; font-size: 14px; font-family: 'DM Sans', sans-serif; color: #1a1a2e; outline: none; transition: 0.2s; box-sizing: border-box; background: #f8f9ff; }
    .form-group input:focus, .form-group textarea:focus, .form-group select:focus { border-color: #5c6ef8; box-shadow: 0 0 0 3px rgba(92,110,248,0.1); background: white; }
    .form-group textarea { resize: vertical; min-height: 130px; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
    .btn-submit { background: #5c6ef8; color: white; padding: 13px 28px; border-radius: 12px; border: none; font-weight: 700; font-size: 15px; font-family: 'DM Sans', sans-serif; cursor: pointer; width: 100%; transition: 0.3s; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-submit:hover { background: #3a4ce0; transform: translateY(-1px); }
    .success-banner { background: #d1fae5; border: 1px solid #6ee7b7; color: #065f46; padding: 14px 18px; border-radius: 10px; margin-bottom: 24px; font-size: 14px; font-weight: 500; display: flex; align-items: center; gap: 8px; }
    .back-link { color: #5c6ef8; text-decoration: none; font-size: 14px; font-weight: 600; display: inline-flex; align-items: center; gap: 5px; }
    .back-link:hover { color: #3a4ce0; }
</style>

<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<div class="contact-wrapper">
    <div class="page-header">
        <div>
            <h1>Contact Us</h1>
            <p>Have a question? We are here to help!</p>
        </div>
        <a href="/dashboard/" class="back-link"><i class="bi bi-arrow-left"></i> Dashboard</a>
    </div>

    {% if messages %}
        {% for message in messages %}
        <div class="success-banner">
            <i class="bi bi-check-circle-fill"></i> {{ message }}
        </div>
        {% endfor %}
    {% endif %}

    <div class="contact-card">
        <form method="POST">
            {% csrf_token %}
            <div class="form-row">
                <div class="form-group">
                    <label>Your Name *</label>
                    <input type="text" name="name" placeholder="e.g. Rahul Sharma" required>
                </div>
                <div class="form-group">
                    <label>Email Address *</label>
                    <input type="email" name="email" placeholder="rahul@example.com" required>
                </div>
            </div>

            <div class="form-group">
                <label>Query Type *</label>
                <select name="query_type" required>
                    <option value="">-- Select Query --</option>
                    <option value="Technical Issue">Technical Issue</option>
                    <option value="Resume Help">Resume Help</option>
                    <option value="Account Issue">Account Issue</option>
                    <option value="Feature Request">Feature Request</option>
                    <option value="Other">Other</option>
                </select>
            </div>

            <div class="form-group">
                <label>Subject *</label>
                <input type="text" name="subject" placeholder="Describe your issue" required>
            </div>

            <div class="form-group">
                <label>Your Query *</label>
                <textarea name="message" placeholder="Describe your issue or query in detail..." required></textarea>
            </div>

            <button type="submit" class="btn-submit">
                <i class="bi bi-send"></i> Submit Query 
            </button>
        </form>
    </div>
</div>

{% if messages %}
<script>
    Swal.fire({ toast: true, position: 'top-end', icon: 'success', title: 'Query submit ho gayi!', showConfirmButton: false, timer: 3000 });
</script>
{% endif %}

{% endblock %}
