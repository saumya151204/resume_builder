<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resume Builder</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Fraunces:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #5c6ef8;
            --primary-dark: #3a4ce0;
            --accent: #ff6b6b;
            --bg: #eef0ff;
            --card: #ffffff;
            --text: #1a1a2e;
            --muted: #6b7280;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .main-nav {
            background: white;
            border-bottom: 1px solid #e5e7eb;
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 1px 8px rgba(92,110,248,0.07);
        }

        .nav-brand {
            font-family: 'Fraunces', serif;
            font-size: 22px;
            font-weight: 700;
            color: var(--primary);
            letter-spacing: -0.5px;
            text-decoration: none;
        }

        .nav-brand span { color: var(--accent); }

        .nav-links a {
            color: var(--muted);
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            margin-left: 24px;
            transition: color 0.2s;
        }

        .nav-links a:hover { color: var(--primary); }

        .nav-logout-btn {
            background: none;
            border: none;
            color: var(--muted);
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            font-family: 'DM Sans', sans-serif;
            margin-left: 24px;
            transition: color 0.2s;
        }

        .nav-logout-btn:hover { color: var(--accent); }

        .resume-card {
            background: var(--card);
            border-radius: 20px;
            box-shadow: 0 4px 24px rgba(92,110,248,0.10);
            border: 1px solid #e8eaff;
        }

        .resume-card input,
        .resume-card select,
        .resume-card textarea {
            background: #f8f9ff;
            border: 1.5px solid #e0e4ff;
            border-radius: 10px;
            padding: 10px 14px;
            width: 100%;
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            transition: 0.2s;
            margin-bottom: 8px;
        }

        .resume-card input:focus,
        .resume-card select:focus,
        .resume-card textarea:focus {
            outline: none;
            border-color: var(--primary);
            background: white;
            box-shadow: 0 0 0 3px rgba(92,110,248,0.15);
        }

        .resume-card label {
            font-weight: 600;
            font-size: 12px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
            display: block;
        }

        .resume-card input[type="checkbox"] {
            width: auto;
            margin-bottom: 0;
            accent-color: var(--accent);
        }

        .btn-custom {
            background: var(--primary);
            color: #fff;
            font-weight: 600;
            border-radius: 10px;
            padding: 12px;
            border: none;
            transition: 0.3s;
            font-family: 'DM Sans', sans-serif;
            font-size: 15px;
        }

        .btn-custom:hover {
            background: var(--primary-dark);
            transform: translateY(-1px);
            box-shadow: 0 4px 16px rgba(92,110,248,0.3);
            color: white;
        }

        .section-title {
            font-family: 'Fraunces', serif;
            font-size: 26px;
            color: var(--text);
            text-align: center;
            margin-bottom: 8px;
            font-weight: 700;
        }

        .section-subtitle {
            text-align: center;
            color: var(--muted);
            font-size: 14px;
            margin-bottom: 24px;
        }

        .form-section {
            background: #f8f9ff;
            border-radius: 12px;
            padding: 18px;
            margin-bottom: 16px;
            border: 1.5px solid #e0e4ff;
        }
    </style>
</head>
<body>

<nav class="main-nav">
    <a class="nav-brand" href="/">Resume<span>.</span>io</a>
    <div class="nav-links">
        {% if user.is_authenticated %}
            <a href="/dashboard/"><i class="bi bi-grid-fill"></i> Dashboard</a>
            <form action="{% url 'logout' %}" method="POST" style="display:inline">
                {% csrf_token %}
                <button type="submit" class="nav-logout-btn">
                    <i class="bi bi-box-arrow-right"></i> Logout
                </button>
            </form>
        {% else %}
            <a href="/login/">Login</a>
            <a href="/register/">Register</a>
        {% endif %}
    </div>
</nav>

<div class="container py-5">
    {% block content %}{% endblock %}
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
