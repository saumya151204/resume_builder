<!DOCTYPE html>
<html>
<head>
    <title>Resume Builder</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            min-height: 100vh;
        }

        /* NAVBAR */
        .navbar {
            background: rgba(0,0,0,0.6) !important;
            backdrop-filter: blur(10px);
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: 0.5px;
        }

        /* CARD */
        .resume-card {
            background: #fff;
            border-radius: 18px;
            box-shadow: 0 12px 30px rgba(0,0,0,0.15);
            border: none;
        }

        /* TITLE */
        .title {
            color: #000;
            font-weight: 700;
            text-align: center;
            margin-bottom: 25px;
        }

        /* INPUTS */
        .resume-card input,
        .resume-card select,
        .resume-card textarea {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 10px;
            padding: 10px;
            width: 100%;
            color: #000;
            font-weight: 500;
            transition: 0.2s;
            margin-bottom: 10px;
        }

        .resume-card input:focus,
        .resume-card select:focus,
        .resume-card textarea:focus {
            outline: none;
            border-color: #4facfe;
            box-shadow: 0 0 0 3px rgba(79, 172, 254, 0.25);
        }

        /* BUTTON */
        .btn-custom {
            background: #4facfe;
            color: #fff;
            font-weight: 600;
            border-radius: 10px;
            padding: 10px;
            border: none;
            transition: 0.3s;
        }

        .btn-custom:hover {
            background: #2f9dfc;
            transform: translateY(-1px);
        }
    </style>

</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark">
    <div class="container">
        <span class="navbar-brand">Resume Builder</span>
    </div>
</nav>

<!-- Main Content -->
<div class="container py-4">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
