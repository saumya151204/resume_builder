{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">

        <div class="resume-card p-4">
            <div class="progress">
                <div class="progress-bar" style="width:40%"></div>
            </div>
            <div class="section-title"> Education</div>
            <p class="section-subtitle">Add your educational qualifications</p>

            <form method="POST">
                {% csrf_token %}
                {{ formset.management_form }}

                {% for form in formset %}
                    <div class="form-section">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                            <strong style="color:#5c6ef8; font-size:13px;">Entry {{ forloop.counter }}</strong>
                            {% if form.instance.pk %}
                                <label style="color:#ef4444; font-size:12px; display:flex; align-items:center; gap:4px; cursor:pointer;">
                                    {{ form.DELETE }} Remove
                                </label>
                            {% endif %}
                        </div>
                        {{ form.as_p }}
                    </div>
                {% endfor %}
                <div class="step-actions">
                    <a href="javascript:history.back()" class="btn-back">← Back</a>
                    <button class="btn-next">Next →</button>
                </div>

                <button type="submit" class="btn btn-custom w-100 mt-2">
                    Next: Experience →
                </button>
            </form>
        </div>

    </div>
</div>
{% endblock %}
