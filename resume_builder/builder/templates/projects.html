{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-8 col-lg-7">

        <div class="resume-card p-4">
            <div class="section-title">🚀 Projects</div>
            <p class="section-subtitle">Showcase your best work</p>

            <form method="POST">
                {% csrf_token %}
                {{ formset.management_form }}

                {% for form in formset %}
                    <div class="form-section">
                        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                            <strong style="color:#5c6ef8; font-size:13px;">Project {{ forloop.counter }}</strong>
                            {% if form.instance.pk %}
                                <label style="color:#ef4444; font-size:12px; display:flex; align-items:center; gap:4px; cursor:pointer;">
                                    {{ form.DELETE }} Remove
                                </label>
                            {% endif %}
                        </div>
                        {{ form.as_p }}
                    </div>
                {% endfor %}

                <button type="submit" class="btn btn-custom w-100 mt-2" style="background:#10b981;">
                    ✅ Finish & Preview →
                </button>
            </form>
        </div>

    </div>
</div>
{% endblock %}
