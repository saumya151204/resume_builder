{% extends 'base.html' %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-7 col-lg-6">

        <div class="resume-card p-4">
            <div class="section-title">👤 Personal Info</div>
            <p class="section-subtitle">Tell us about yourself</p>

            <form method="POST">
                {% csrf_token %}
                {{ form.as_p }}
                <button type="submit" class="btn btn-custom w-100 mt-2">
                    Next: Education →
                </button>
            </form>
        </div>

    </div>
</div>
{% endblock %}
