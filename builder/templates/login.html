<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Login</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #4facfe, #00f2fe);
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Card */
.login-box {
    background: white;
    padding: 40px;
    border-radius: 12px;
    width: 350px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.2);
    text-align: center;
}

.login-box h2 {
    margin-bottom: 20px;
    color: #333;
}

/* Inputs */
input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border-radius: 8px;
    border: 1px solid #ddd;
}

input:focus {
    outline: none;
    border-color: #4facfe;
}

/* Button */
button {
    width: 100%;
    padding: 12px;
    background: #4facfe;
    border: none;
    border-radius: 8px;
    color: white;
    font-weight: 600;
    margin-top: 10px;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #007bff;
}

p {
    margin-top: 15px;
}

a {
    color: #007bff;
    text-decoration: none;
}
</style>
</head>

<body>

<div class="login-box">
    <h2>Login</h2>

    <form method="POST">
        {% csrf_token %}
        {{ form.username }}
        {{ form.password }}

        <button type="submit">Login</button>
    </form>

    <p>Don't have an account? <a href="#">Sign up</a></p>
</div>

</body>
</html>
